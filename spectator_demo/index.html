<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realtime Spectator State-Sync</title>
    <link rel="stylesheet" href="style.css">
    <!-- Cốt lõi duy nhất: PeerJS CDN (Zero Backend Required) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <!-- Canvas 3D (Render logic) -->
    <canvas id="game-canvas"></canvas>

    <!-- UI Layer: Dùng để vẽ các giao diện DOM đè lên Canvas -->
    <div id="ui-layer">
        
        <!-- Màn hình chờ (Main Menu) -->
        <div id="menu-screen" class="screen">
            <h1>SPECTATOR<br><span style="font-size:0.4em; color:var(--glow-purple);">STATE-SYNC DEMO</span></h1>
            
            <div class="menu-box">
                <button id="btn-host" class="btn-red">🔴 TRỞ THÀNH NGƯỜI CHƠI (HOST)</button>
                
                <div style="text-align: center; color: #555; margin: 10px 0;">HOẶC</div>
                
                <input type="text" id="input-room-id" class="input-box" placeholder="Nhập ID Phòng...">
                <button id="btn-join">👁️ VÀO XEM (VIEWER)</button>
            </div>
        </div>

        <!-- Trạng thái lúc đang Host hoặc View -->
        <div id="hud-top-left" class="hidden">
            <div class="live-indicator"><span class="live-dot"></span><span id="role-text">LIVE</span></div>
            <div class="info-text">ID Phòng: <span id="room-id-display" class="info-highlight">...</span> (Nhấn để Copy)</div>
        </div>

        <div id="hud-top-right" class="hidden">
            <div class="info-text">Ping: <span id="ping-text" style="color:var(--glow-cyan);">0</span> ms</div>
            <div class="info-text">Viewers: <span id="viewer-count" style="color:var(--glow-purple);">0</span></div>
            <div class="info-text">FPS: <span id="fps-text">0</span></div>
        </div>

        <!-- Màn hình báo trạng thái kết nối -->
        <div id="connection-overlay" class="hidden">
            <div id="conn-spinner"></div>
            <div id="conn-text" style="color: var(--glow-cyan); font-weight: bold; letter-spacing: 1px;">ĐANG KẾT NỐI...</div>
        </div>

    </div>

    <!-- Tải các file logic theo thứ tự -->
    <script src="network.js"></script>
    <script src="spectator.js"></script>
    <script src="renderer.js"></script>
    <script src="app.js"></script>
</body>
</html>
